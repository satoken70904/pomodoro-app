<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport"
        content="width=device-width, initial-scale=1.0">
  <title>Pomodoro Timer</title>

  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div class="container">

    <h1 id="mode">作業中</h1>

    <div id="timer">
      25:00
    </div>

    <button id="startBtn">
      開始
    </button>

    <button id="stopBtn">
      停止
    </button>
    
    <button id="resetBtn">
     リセット
    </button>
    
  </div>

  <script src="script.js"></script>

</body>
</html>
